name: CI

# main への push / PR のたびに:
#   1. pytest でソートアルゴリズムの正当性を検証
#   2. benchmark.py を実行してベンチマークが壊れていないか確認
#   3. 生成された benchmark_chart.png / benchmark_result.csv をArtifactとして保存
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest matplotlib

      - name: Run tests (sort correctness)
        run: python -m pytest tests/ -v

      - name: Run benchmark (regression + chart generation)
        run: python benchmark.py

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark_chart.png
            benchmark_result.csv
